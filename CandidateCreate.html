<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Profile — TalentMatch</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F1EC;
      --bg-card: #FDFCFA;
      --ink: #1A1A18;
      --ink-soft: #5C5C54;
      --green: #1A7F5A;
      --green-bg: #E8F5EF;
      --border: rgba(26,26,24,0.1);
      --border-md: rgba(26,26,24,0.18);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
    }

    nav {
      position: sticky;
      top: 0;
      background: rgba(244,241,236,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      height: 60px;
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      text-decoration: none;
      color: var(--ink);
    }

    .nav-logo span { color: var(--green); }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
    }

    .profile-page {
      max-width: 1000px;
      margin: 70px auto;
      padding: 0 2rem 80px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .page-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 40px;
      margin: 12px 0;
    }

    .page-header p {
      color: var(--ink-soft);
      max-width: 600px;
      margin: auto;
      font-size: 15px;
    }

    .profile-form {
      background: var(--bg-card);
      border: 1px solid var(--border-md);
      border-radius: 16px;
      padding: 32px;
    }

    .form-card {
      padding: 28px 0;
      border-bottom: 1px solid var(--border-md);
    }

    .form-card:last-child {
      border-bottom: none;
    }

    .top-section {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 40px;
      align-items: center;
    }

    .photo-upload,
    .resume-upload {
      text-align: center;
      background: var(--green-bg);
      border-radius: 12px;
      padding: 22px;
      border: 1px dashed var(--border-md);
      margin-top: 12px;
    }

    .photo-placeholder {
      width: 120px;
      height: 100px;
      margin: 0 auto 12px;
      background: var(--bg-card);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      overflow: hidden;
    }

    .photo-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    button {
      border: 1px solid var(--border-md);
      background: white;
      border-radius: 20px;
      padding: 8px 14px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    button:hover {
      color: var(--green);
      border-color: var(--green);
    }

    h2 {
      margin-bottom: 18px;
      font-size: 20px;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--ink-soft);
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border-md);
      background: #F7F5F1;
      font-family: 'DM Sans', sans-serif;
    }

    textarea { resize: vertical; }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .entry-set {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
      background: #FFFEFC;
    }

    .add-btn {
      margin-top: 8px;
    }

    .skill-tags {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .skill-tags span {
      background: var(--green-bg);
      color: var(--green);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      border: 1px solid var(--green);
      cursor: pointer;
    }

    .submit-btn {
      margin-top: 30px;
      width: 100%;
      background: var(--green);
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .top-section,
      .two-column {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html" class="nav-logo">Talent<span>Match</span></a>
  <a href="CandidateProfile.html" class="back-link">Find Profile</a>
</nav>

<main class="profile-page">

  <div class="page-header">
    <h1>Create A Profile</h1>
    <p>Enter your details so employers can understand your background and skills.</p>
  </div>

  <form class="profile-form">

    <section class="form-card top-section">
      <div class="photo-upload">
        <div class="photo-placeholder" id="photoPreview">🖼️</div>

        <label>Profile Photo</label>
        <input type="file" id="profilePhoto" accept="image/*">
      </div>

      <div>
        <label>Full Name</label>
        <input type="text" id="fullName">

        <label>Email</label>
        <input type="email" id="email">

        <label>Phone Number</label>
        <input type="tel" id="phone">
      </div>
    </section>

    <section class="form-card">
      <h2>Education</h2>

      <div id="educationContainer">
        <div class="entry-set">
          <label>Level of qualification</label>
          <input type="text" class="edu-level">

          <label>Qualification title</label>
          <input type="text" class="edu-degree">

          <div class="two-column">
            <div>
              <label>Start Date</label>
              <input type="date" class="edu-start">
            </div>
            <div>
              <label>Completion Date</label>
              <input type="date" class="edu-end">
            </div>
          </div>
        </div>
      </div>

      <button type="button" class="add-btn" onclick="addEducation()">+ Add another education</button>
    </section>

    <section class="form-card">
      <h2>Experience</h2>

      <div id="experienceContainer">
        <div class="entry-set">
          <label>Job title</label>
          <input type="text" class="exp-title">

          <label>Company Name</label>
          <input type="text" class="exp-company">

          <div class="two-column">
            <div>
              <label>Start Date</label>
              <input type="date" class="exp-start">
            </div>
            <div>
              <label>End Date</label>
              <input type="date" class="exp-end">
            </div>
          </div>
        </div>
      </div>

      <button type="button" class="add-btn" onclick="addExperience()">+ Add another experience</button>
    </section>

    <section class="form-card">
      <h2>Skills</h2>

      <div class="skill-tags" id="skillTags"></div>

      <div class="two-column">
        <select id="skillSelect">
          <option value="">Select skill</option>
          <option>JavaScript</option>
          <option>Python</option>
          <option>Java</option>
          <option>C++</option>
          <option>SQL</option>
          <option>React</option>
          <option>CSS</option>
          <option>Communication</option>
          <option>Teamwork</option>
          <option>Leadership</option>
          <option>Time Management</option>
          <option>Critical Thinking</option>
          <option>Project Management</option>
        </select>

        <button type="button" onclick="addSkill()">+ Add Skill</button>
      </div>
    </section>

    <section class="form-card">
      <h2>Preferred Working Mode</h2>

      <select id="workModeSelect">
        <option value="">Select Mode</option>
        <option value="Remote">Remote</option>
        <option value="On-site">On-site</option>
        <option value="Hybrid">Hybrid</option>
      </select>
    </section>

    <section class="form-card">
      <h2>Preferred Location</h2>
      <input type="text" id="LocationSelect" placeholder="Enter a location">
    </section>

    <section class="form-card">
      <h2>Personal Blurb</h2>
      <textarea id="blurb" rows="5"></textarea>
    </section>

    <section class="form-card">
      <h2>Upload Resume</h2>
      <p style="color: var(--ink-soft); font-size: 14px;">Upload your resume as a PDF or Word document.</p>

      <div class="resume-upload">
        <input type="file" id="resumeFile" accept=".pdf,.doc,.docx">
      </div>
    </section>

    <button type="button" class="submit-btn" onclick="submitProfile()">
      Create Profile
    </button>

  </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
  const supabaseClient = supabase.createClient(
    "https://bzakjtfktgdlmmevbnfo.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6YWtqdGZrdGdkbG1tZXZibmZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDQwMzYsImV4cCI6MjA5MzQyMDAzNn0.z6aTOm35-BLJ43B_rUknD8yilNu-jkOId6RcR68U-B0"
  );

  const STORAGE_BUCKET = "candidate-files";

  document.getElementById("profilePhoto").addEventListener("change", function(event) {
    const file = event.target.files[0];

    if (file) {
      const reader = new FileReader();

      reader.onload = function(e) {
        document.getElementById("photoPreview").innerHTML =
          `<img src="${e.target.result}" alt="Profile photo preview">`;
      };

      reader.readAsDataURL(file);
    }
  });

  function addEducation() {
    const container = document.getElementById("educationContainer");

    const newEducation = document.createElement("div");
    newEducation.classList.add("entry-set");

    newEducation.innerHTML = `
      <label>Level of qualification</label>
      <input type="text" class="edu-level">

      <label>Qualification title</label>
      <input type="text" class="edu-degree">

      <div class="two-column">
        <div>
          <label>Start Date</label>
          <input type="date" class="edu-start">
        </div>
        <div>
          <label>Completion Date</label>
          <input type="date" class="edu-end">
        </div>
      </div>
    `;

    container.appendChild(newEducation);
  }

  function addExperience() {
    const container = document.getElementById("experienceContainer");

    const newExperience = document.createElement("div");
    newExperience.classList.add("entry-set");

    newExperience.innerHTML = `
      <label>Job title</label>
      <input type="text" class="exp-title">

      <label>Company Name</label>
      <input type="text" class="exp-company">

      <div class="two-column">
        <div>
          <label>Start Date</label>
          <input type="date" class="exp-start">
        </div>
        <div>
          <label>End Date</label>
          <input type="date" class="exp-end">
        </div>
      </div>
    `;

    container.appendChild(newExperience);
  }

  function addSkill() {
    const skillSelect = document.getElementById("skillSelect");
    const skillTags = document.getElementById("skillTags");
    const selectedSkill = skillSelect.value;

    if (selectedSkill === "") {
      alert("Please select a skill first.");
      return;
    }

    const existingSkills = Array.from(skillTags.querySelectorAll("span"))
      .map(skill => skill.innerText.replace(" ×", ""));

    if (existingSkills.includes(selectedSkill)) {
      alert("This skill has already been added.");
      return;
    }

    const skillTag = document.createElement("span");
    skillTag.innerHTML = `${selectedSkill} ×`;

    skillTag.onclick = function () {
      skillTag.remove();
    };

    skillTags.appendChild(skillTag);
    skillSelect.value = "";
  }

  
  async function uploadFile(file, folderName) {
    if (!file) return null;

    const fileExt = file.name.split(".").pop();
    const fileName = `${folderName}/${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;

    const { error } = await supabaseClient.storage
      .from(STORAGE_BUCKET)
      .upload(fileName, file);

    if (error) {
      console.error(error);
      alert("File upload failed.");
      return null;
    }

    const { data } = supabaseClient.storage
      .from(STORAGE_BUCKET)
      .getPublicUrl(fileName);

    return data.publicUrl;
  }

  async function submitProfile() {
    const name = document.getElementById("fullName").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const blurb = document.getElementById("blurb").value.trim();
    const workMode = document.getElementById("workModeSelect").value;
    const preferredLocation = document.getElementById("LocationSelect").value.trim();

    if (!name || !email || !phone) {
      alert("Please enter your name, email, and phone number.");
      return;
    }

    const profilePhoto = document.getElementById("profilePhoto").files[0];
    const resumeFile = document.getElementById("resumeFile").files[0];

    const profilePhotoUrl = await uploadFile(profilePhoto, "profile-photos");
    const resumeUrl = await uploadFile(resumeFile, "resumes");

    const { data: candidate, error } = await supabaseClient
      .from("candidate")
      .insert([{
        name,
        email,
        phone,
        blurb,
        profile_photo_url: profilePhotoUrl,
        resume_url: resumeUrl, 
        working_mode: workMode,
        preferred_location: preferredLocation
      }])
      .select()
      .single();

    if (error) {
      console.error(error);
      alert("Error saving profile. Check if this email or phone already exists.");
      return;
    }

    const candidateId = candidate.candidate_id;

    const educationData = [];

    document.querySelectorAll("#educationContainer .entry-set").forEach(e => {
      const level = e.querySelector(".edu-level").value.trim();
      const degree = e.querySelector(".edu-degree").value.trim();
      const startDate = e.querySelector(".edu-start").value || null;
      const endDate = e.querySelector(".edu-end").value || null;

      if (level || degree || startDate || endDate) {
        educationData.push({
          candidate_id: candidateId,
          level,
          degree,
          start_date: startDate,
          end_date: endDate
        });
      }
    });

    if (educationData.length > 0) {
      await supabaseClient.from("education").insert(educationData);
    }

    const experienceData = [];

    document.querySelectorAll("#experienceContainer .entry-set").forEach(e => {
      const jobTitle = e.querySelector(".exp-title").value.trim();
      const company = e.querySelector(".exp-company").value.trim();
      const startDate = e.querySelector(".exp-start").value || null;
      const endDate = e.querySelector(".exp-end").value || null;

      if (jobTitle || company || startDate || endDate) {
        experienceData.push({
          candidate_id: candidateId,
          job_title: jobTitle,
          company,
          start_date: startDate,
          end_date: endDate
        });
      }
    });

    if (experienceData.length > 0) {
      await supabaseClient.from("experience").insert(experienceData);
    }

    const skillData = [];

    document.querySelectorAll("#skillTags span").forEach(s => {
      skillData.push({
        candidate_id: candidateId,
        skill_name: s.innerText.replace(" ×", "")
      });
    });

    if (skillData.length > 0) {
      await supabaseClient.from("skill").insert(skillData);
    }

    alert(`Profile created successfully! Your Profile ID is ${candidateId}`);

    window.location.href = `CandidateProfile.html?id=${candidateId}`;
  }
</script>

</body>
</html>
