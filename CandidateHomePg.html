<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Home — TalentMatch</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --bg:        #F4F1EC;
      --bg-card:   #FDFCFA;
      --ink:       #1A1A18;
      --ink-soft:  #5C5C54;
      --ink-muted: #9C9C90;
      --accent:    #2B5CE6;
      --accent-bg: #EEF2FD;
      --green:     #1A7F5A;
      --green-bg:  #E8F5EF;
      --border:    rgba(26,26,24,0.1);
      --border-md: rgba(26,26,24,0.18);
      --radius:    12px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    nav {
      position: sticky; 
      top: 0; 
      z-index: 100;
      background: rgba(244,241,236,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      height: 60px;
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      letter-spacing: -0.02em;
      color: var(--ink);
      text-decoration: none;
    }

    .nav-logo span { 
      color: var(--accent); 
    }

    .nav-links { 
      display: flex; 
      gap: 8px; 
      align-items: center;
    }

    .nav-links a {
      text-decoration: none; 
      color: var(--ink-soft);
      font-size: 14px; 
      font-weight: 500;
      padding: 6px 14px; 
      border-radius: 20px;
      transition: all 0.15s;
    }

    .nav-links a:hover { 
      background: var(--border); 
      color: var(--ink); 
    }

    .btn-nav {
      background: var(--ink) !important; 
      color: #fff !important;
      padding: 7px 18px !important; 
      border-radius: 20px !important;
    }

    .btn-nav:hover { 
      opacity: 0.85 !important; 
    }

    .profile-btn {
      text-decoration: none;
      border-radius: 24px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 500;
      transition: 0.15s;
      background: var(--accent);
      color: #fff !important;
    }

    .profile-btn:hover {
      opacity: 0.88;
      background: var(--accent) !important;
      color: #fff !important;
    }

    .hero {
      max-width: 900px; 
      margin: 0 auto;
      padding: 70px 2rem 45px;
      text-align: center;
    }

    .hero-eyebrow {
      display: inline-block;
      font-size: 12px; 
      font-weight: 500; 
      letter-spacing: 0.1em;
      text-transform: uppercase; 
      color: var(--accent);
      background: var(--accent-bg);
      padding: 4px 14px; 
      border-radius: 20px;
      margin-bottom: 24px;
    }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(36px, 6vw, 58px);
      line-height: 1.1; 
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 20px;
    }

    .hero h1 em { 
      font-style: italic; 
      color: var(--accent); 
    }

    .hero p {
      font-size: 17px; 
      color: var(--ink-soft);
      max-width: 560px; 
      margin: 0 auto;
      line-height: 1.7;
    }

    .section-divider {
      max-width: 1100px; 
      margin: 45px auto 0;
      padding: 0 2rem;
      display: flex; 
      align-items: center; 
      gap: 16px;
    }

    .section-divider::before, 
    .section-divider::after {
      content: ''; 
      flex: 1; 
      height: 1px; 
      background: var(--border-md);
    }

    .section-divider span {
      font-family: 'DM Serif Display', serif;
      font-size: 13px; 
      color: var(--ink-muted);
      white-space: nowrap; 
      letter-spacing: 0.05em;
    }

    .listings-section {
      max-width: 1100px; 
      margin: 0 auto;
      padding: 40px 2rem 80px;
    }

    .listings-header {
      display: flex; 
      align-items: flex-end; 
      justify-content: space-between;
      margin-bottom: 24px; 
      flex-wrap: wrap; 
      gap: 16px;
    }

    .listings-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px; 
      letter-spacing: -0.02em;
    }

    .listings-header p { 
      font-size: 13px; 
      color: var(--ink-muted); 
      margin-top: 2px; 
    }

    .search-bar {
      display: flex; 
      gap: 10px; 
      margin-bottom: 24px; 
      flex-wrap: wrap;
    }

    .search-bar input {
      flex: 1; 
      min-width: 200px;
      border: 1px solid var(--border-md); 
      border-radius: var(--radius-sm);
      background: var(--bg-card); 
      color: var(--ink);
      padding: 10px 16px; 
      font-size: 14px; 
      font-family: inherit;
      outline: none; 
      transition: border-color 0.15s;
    }

    .search-bar input:focus { 
      border-color: var(--accent); 
    }

    .search-bar input::placeholder { 
      color: var(--ink-muted); 
    }

    .filter-btn {
      padding: 10px 18px; 
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-md); 
      background: var(--bg-card);
      color: var(--ink-soft); 
      font-size: 13px; 
      font-family: inherit;
      font-weight: 500; 
      cursor: pointer; 
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover, 
    .filter-btn.active {
      background: var(--ink); 
      color: #fff; 
      border-color: var(--ink);
    }

    .job-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .job-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex; 
      flex-direction: column; 
      gap: 14px;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      cursor: pointer;
    }

    .job-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.07);
      border-color: var(--border-md);
    }

    .job-card-top { 
      display: flex; 
      justify-content: space-between; 
      align-items: flex-start; 
      gap: 12px; 
    }

    .company-logo {
      width: 42px; 
      height: 42px; 
      border-radius: 10px;
      background: var(--accent-bg);
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 18px; 
      flex-shrink: 0;
    }

    .job-title {
      font-family: 'DM Serif Display', serif;
      font-size: 17px; 
      line-height: 1.3;
      color: var(--ink); 
      letter-spacing: -0.01em;
    }

    .company-name { 
      font-size: 13px; 
      color: var(--ink-soft); 
      margin-top: 2px; 
    }

    .job-meta {
      display: flex; 
      flex-wrap: wrap; 
      gap: 8px;
    }

    .badge {
      font-size: 11px; 
      font-weight: 500; 
      padding: 3px 10px;
      border-radius: 20px; 
      letter-spacing: 0.01em;
    }

    .badge-mode-Remote { 
      background: var(--green-bg);  
      color: var(--green); 
    }

    .badge-mode-Hybrid { 
      background: var(--accent-bg); 
      color: var(--accent); 
    }

    .badge-mode-On-site { 
      background: #FDF3E7; 
      color: #B36B00; 
    }

    .badge-location { 
      background: var(--bg); 
      color: var(--ink-soft); 
      border: 1px solid var(--border); 
    }

    .badge-exp { 
      background: var(--bg); 
      color: var(--ink-soft); 
      border: 1px solid var(--border); 
    }

    .job-desc {
      font-size: 13px; 
      color: var(--ink-soft); 
      line-height: 1.65;
      display: -webkit-box; 
      -webkit-line-clamp: 3; 
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .skill-tags { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 6px; 
    }

    .skill-tag {
      font-size: 11px; 
      padding: 3px 10px;
      background: var(--bg); 
      border: 1px solid var(--border);
      border-radius: 6px; 
      color: var(--ink-soft);
    }

    .job-card-footer {
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      padding-top: 12px; 
      border-top: 1px solid var(--border);
    }

    .posted-date { 
      font-size: 12px; 
      color: var(--ink-muted); 
    }

    .btn-apply {
      font-size: 12px; 
      font-weight: 500; 
      padding: 7px 16px;
      border-radius: 20px; 
      border: none; 
      cursor: pointer;
      background: var(--ink); 
      color: #fff;
      font-family: inherit; 
      transition: opacity 0.15s;
    }

    .btn-apply:hover { 
      opacity: 0.8; 
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center; 
      padding: 60px 20px;
      color: var(--ink-muted); 
      font-size: 14px;
    }

    .empty-state p:first-child { 
      font-size: 24px; 
      margin-bottom: 8px; 
    }

    .logout-btn {
      border: 1px solid var(--border-md);
      background: var(--bg-card);
      color: var(--ink-soft);
      border-radius: 24px;
      padding: 8px 16px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: 0.15s;
    }

    .logout-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="nav-logo">Talent<span>Match</span></a>

    <div class="nav-links">
      <a href="#" id="profileBtn" class="profile-btn">Profile</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <section class="hero">
    <span class="hero-eyebrow">Candidate Home</span>
    <h1>Find roles that <em>match your profile</em></h1>
    <p>Browse open positions and access your candidate profile using the same ID saved from your login.</p>
  </section>

  <div class="section-divider">
    <span>Open positions</span>
  </div>

  <section class="listings-section">
    <div class="listings-header">
      <div>
        <h2>Latest job listings</h2>
        <p id="results-count">Showing all open positions</p>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search by keyword, title, or skill…" />
      <button class="filter-btn active" data-mode="All">All</button>
      <button class="filter-btn" data-mode="Remote">Remote</button>
      <button class="filter-btn" data-mode="Hybrid">Hybrid</button>
      <button class="filter-btn" data-mode="On-site">On-site</button>
    </div>

    <div class="job-grid" id="job-grid"></div>
  </section>

  <script>
    // Get the candidate ID saved from CandidateLogin.html
    const candidateId = localStorage.getItem("candidateId");

    // Connect the Profile button to the correct candidate profile
    const profileBtn = document.getElementById("profileBtn");

    if (candidateId) {
      profileBtn.href = `candidateProfile.html?id=${candidateId}`;
    } else {
      profileBtn.href = "CandidateLogin.html";
    }

    const jobs = [
      {
        id: 1,
        title: "Junior Frontend Developer",
        company: "TechCorp Australia",
        emoji: "💻",
        description: "We are looking for a motivated junior frontend developer to join our growing team. You will build responsive web interfaces using React and collaborate closely with backend engineers.",
        education: "Bachelor's Degree",
        skills: ["React", "JavaScript", "CSS", "Git"],
        yearsExp: 1,
        mode: "Hybrid",
        location: "Sydney, NSW",
        posted: "2 days ago"
      },
      {
        id: 2,
        title: "Data Analyst",
        company: "TechCorp Australia",
        emoji: "📊",
        description: "Analyse large datasets to generate business insights. Work closely with product and engineering teams to drive data-informed decisions across the organisation.",
        education: "Bachelor's Degree",
        skills: ["Python", "SQL", "Pandas", "Tableau"],
        yearsExp: 2,
        mode: "Remote",
        location: "Sydney, NSW",
        posted: "3 days ago"
      },
      {
        id: 3,
        title: "Backend Engineer",
        company: "TechCorp Australia",
        emoji: "⚙️",
        description: "Design and maintain scalable backend services. Experience with microservices architecture and containerisation required. Join a senior engineering team working on enterprise software.",
        education: "Bachelor's Degree",
        skills: ["Java", "Spring Boot", "Docker", "PostgreSQL"],
        yearsExp: 4,
        mode: "On-site",
        location: "Melbourne, VIC",
        posted: "5 days ago"
      },
      {
        id: 4,
        title: "Full Stack Developer",
        company: "WebCo",
        emoji: "🌐",
        description: "Own features end-to-end across our React frontend and Node.js backend. Join a fast-moving team building consumer-facing web products for clients across Australia.",
        education: "Bachelor's Degree",
        skills: ["React", "Node.js", "SQL", "REST APIs"],
        yearsExp: 3,
        mode: "Hybrid",
        location: "Brisbane, QLD",
        posted: "1 week ago"
      },
      {
        id: 5,
        title: "UI/UX Designer",
        company: "WebCo",
        emoji: "🎨",
        description: "Create intuitive and beautiful user experiences. You will run user research sessions, produce wireframes and high-fidelity mockups, and collaborate closely with developers.",
        education: "Bachelor's Degree",
        skills: ["Figma", "User Research", "Prototyping", "CSS"],
        yearsExp: 2,
        mode: "Remote",
        location: "Remote",
        posted: "1 week ago"
      }
    ];

    let activeMode = "All";
    let searchQuery = "";

    function renderJobs() {
      const grid = document.getElementById("job-grid");
      const count = document.getElementById("results-count");

      const filtered = jobs.filter(job => {
        const modeMatch = activeMode === "All" || job.mode === activeMode;
        const q = searchQuery.toLowerCase();

        const textMatch = !q ||
          job.title.toLowerCase().includes(q) ||
          job.description.toLowerCase().includes(q) ||
          job.skills.some(skill => skill.toLowerCase().includes(q)) ||
          job.company.toLowerCase().includes(q);

        return modeMatch && textMatch;
      });

      count.textContent = filtered.length === jobs.length
        ? `Showing all ${jobs.length} open positions`
        : `${filtered.length} of ${jobs.length} positions`;

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <p>🔍</p>
            <p>No jobs match your search.</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = filtered.map(job => `
        <div class="job-card" onclick="alert('Job detail page coming soon!')">
          <div class="job-card-top">
            <div>
              <div class="job-title">${job.title}</div>
              <div class="company-name">${job.company}</div>
            </div>
            <div class="company-logo">${job.emoji}</div>
          </div>

          <div class="job-meta">
            <span class="badge badge-mode-${job.mode.replace(' ', '-')}">${job.mode}</span>
            <span class="badge badge-location">📍 ${job.location}</span>
            <span class="badge badge-exp">⏱ ${job.yearsExp}+ yr${job.yearsExp !== 1 ? 's' : ''}</span>
          </div>

          <p class="job-desc">${job.description}</p>

          <div class="skill-tags">
            ${job.skills.map(skill => `<span class="skill-tag">${skill}</span>`).join("")}
          </div>

          <div class="job-card-footer">
            <span class="posted-date">Posted ${job.posted}</span>
            <button class="btn-apply" onclick="event.stopPropagation(); alert('Apply flow coming soon!')">View role</button>
          </div>
        </div>
      `).join("");
    }

    document.querySelectorAll(".filter-btn").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        activeMode = button.dataset.mode;
        renderJobs();
      });
    });

    document.getElementById("search-input").addEventListener("input", event => {
      searchQuery = event.target.value;
      renderJobs();
    });

    renderJobs();
  </script>

</body>
</html>
