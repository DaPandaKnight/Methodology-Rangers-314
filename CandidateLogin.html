<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — TalentMatch</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/candidate-login.css" />
</head>

<body>

  <div class="login-card">
    <h1>Login</h1>
    <p>Enter your phone number to access your profile</p>

    <input type="tel" id="phoneInput" placeholder="Enter your phone number">

    <button onclick="login()">Login</button>

    <div class="link">
      Don’t have a profile? <a href="CandidateCreate.html">Create one</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = supabase.createClient(
      "https://bzakjtfktgdlmmevbnfo.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6YWtqdGZrdGdkbG1tZXZibmZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDQwMzYsImV4cCI6MjA5MzQyMDAzNn0.z6aTOm35-BLJ43B_rUknD8yilNu-jkOId6RcR68U-B0"
    );

    async function login() {
      const phone = document.getElementById("phoneInput").value.trim();

      if (!phone) {
        alert("Please enter your phone number.");
        return;
      }

      const { data, error } = await supabaseClient
        .from("candidate")
        .select("candidate_id")
        .eq("phone", phone)
        .single();

      if (error || !data) {
        alert("No profile found with that phone number.");
        return;
      }

      const candidateId = data.candidate_id;

      // Save the logged-in user's candidate ID
      localStorage.setItem("candidateId", candidateId);

      // Send user to the candidate home page
      window.location.href = "CandidateHome.html";
    }
  </script>

</body>

</html>
