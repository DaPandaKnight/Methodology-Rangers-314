<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Profile — TalentMatch</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F1EC;
      --bg-card: #FDFCFA;
      --ink: #1A1A18;
      --ink-soft: #5C5C54;
      --green: #1A7F5A;
      --green-bg: #E8F5EF;
      --border: rgba(26,26,24,0.1);
      --border-md: rgba(26,26,24,0.18);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
    }

    nav {
      position: sticky;
      top: 0;
      background: rgba(244,241,236,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      height: 60px;
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      text-decoration: none;
      color: var(--ink);
    }

    .nav-logo span { color: var(--green); }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
    }

    .profile-page {
      max-width: 1100px;
      margin: 70px auto;
      padding: 0 2rem 80px;
    }

    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border-md);
      border-radius: 16px;
      padding: 32px;
    }

    .top-section {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--border-md);
    }

    .photo-box {
      background: var(--green-bg);
      border-radius: 12px;
      padding: 22px;
      text-align: center;
      border: 1px dashed var(--border-md);
    }

    .photo-box img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      background: white;
    }

    .placeholder {
      width: 180px;
      height: 180px;
      margin: auto;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 42px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 16px;
    }

    .contact {
      color: var(--ink-soft);
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .blurb {
      background: #F7F5F1;
      border: 1px solid var(--border);
      padding: 18px;
      border-radius: 12px;
      color: var(--ink-soft);
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 40px;
      margin-top: 32px;
    }

    .entry {
      background: #FFFEFC;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .skill-tags span {
      background: var(--green-bg);
      color: var(--green);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      border: 1px solid var(--green);
    }

    .resume-btn {
      display: inline-block;
      margin-top: 20px;
      background: var(--green);
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html" class="nav-logo">Talent<span>Match</span></a>
  <a href="PhoneLogin.html" class="back-link">← Login</a>
</nav>

<main class="profile-page">
  <div class="profile-card">

    <section class="top-section">
      <div class="photo-box" id="photoBox">
        <div class="placeholder">🖼️</div>
      </div>

      <div>
        <h1 id="name">Loading...</h1>

        <div class="contact">
          <div id="email"></div>
          <div id="phone"></div>
        </div>

        <div class="blurb" id="blurb"></div>

        <a id="resume" class="resume-btn" target="_blank" style="display:none;">
          Download Resume
        </a>
      </div>
    </section>

    <div class="content-grid">
      <div>
        <h2>Education</h2>
        <div id="education"></div>

        <h2>Experience</h2>
        <div id="experience"></div>
      </div>

      <div>
        <h2>Preferred Location</h2>
        <div class="skill-tags">
          <span id="preferredLocation"></span>
        </div>

         <br/>

        <h2>Preferred Mode</h2>
        <div class="skill-tags">
          <span id="workingMode"></span>
        </div>

        <br/>

        <h2>Skills</h2>
        <div class="skill-tags" id="skills"></div>
      </div>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://bzakjtfktgdlmmevbnfo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6YWtqdGZrdGdkbG1tZXZibmZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDQwMzYsImV4cCI6MjA5MzQyMDAzNn0.z6aTOm35-BLJ43B_rUknD8yilNu-jkOId6RcR68U-B0"
);

// Get ID from URL
function getId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

async function loadProfile() {
  const id = getId();

  if (!id) {
    alert("No profile ID found.");
    return;
  }

  // Candidate
  const { data: candidate } = await supabaseClient
    .from("candidate")
    .select("*")
    .eq("candidate_id", id)
    .single();

  document.getElementById("name").textContent = candidate.name;
  document.getElementById("email").textContent = candidate.email;
  document.getElementById("phone").textContent = candidate.phone;
  document.getElementById("blurb").textContent = candidate.blurb;
  
  if (candidate.profile_photo_url) {
    document.getElementById("photoBox").innerHTML =
      `<img src="${candidate.profile_photo_url}">`;
  }

  if (candidate.resume_url) {
    const resume = document.getElementById("resume");
    resume.href = candidate.resume_url;
    resume.style.display = "inline-block";
  }

  // Education
  const { data: education } = await supabaseClient
    .from("education")
    .select("*")
    .eq("candidate_id", id);

  document.getElementById("education").innerHTML =
    education.map(e => `
      <div class="entry">
        <strong>${e.degree}</strong>
        <div>${e.level}</div>
      </div>
    `).join("");

  // Experience
  const { data: experience } = await supabaseClient
    .from("experience")
    .select("*")
    .eq("candidate_id", id);

  document.getElementById("experience").innerHTML =
    experience.map(e => `
      <div class="entry">
        <strong>${e.job_title}</strong>
        <div>${e.company}</div>
      </div>
    `).join("");

  // Skills
  const { data: skills } = await supabaseClient
    .from("skill")
    .select("*")
    .eq("candidate_id", id);

  document.getElementById("skills").innerHTML =
    skills.map(s => `<span>${s.skill_name}</span>`).join("");

  document.getElementById("preferredLocation").textContent =
  candidate.preferred_location || "Not specified";

document.getElementById("workingMode").textContent =
  candidate.working_mode || "Not specified";
}

loadProfile();
</script>

</body>
</html>
