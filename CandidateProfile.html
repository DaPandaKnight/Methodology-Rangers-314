<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Candidate Profile — TalentMatch</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --bg: #F4F1EC;
      --bg-card: #FDFCFA;
      --ink: #1A1A18;
      --ink-soft: #5C5C54;
      --green: #1A7F5A;
      --green-bg: #E8F5EF;
      --border: rgba(26,26,24,0.1);
      --border-md: rgba(26,26,24,0.18);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
    }

    nav {
      position: sticky;
      top: 0;
      background: rgba(244,241,236,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      height: 60px;
      z-index: 20;
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      text-decoration: none;
      color: var(--ink);
    }

    .nav-logo span { 
      color: var(--green); 
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
    }

    .back-link:hover {
      color: var(--green);
    }

    .membership-btn {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
    }

    .membership-btn:hover {
      opacity: 0.88;
    }

    .membership-btn.active {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green);
      cursor: default;
    }

    .profile-page {
      max-width: 1100px;
      margin: 70px auto;
      padding: 0 2rem 80px;
    }

    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border-md);
      border-radius: 16px;
      padding: 32px;
    }

    .top-section {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--border-md);
    }

    .photo-box {
      background: var(--green-bg);
      border-radius: 12px;
      padding: 22px;
      text-align: center;
      border: 1px dashed var(--border-md);
    }

    .photo-box img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      background: white;
    }

    .placeholder {
      width: 180px;
      height: 180px;
      margin: auto;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 42px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 16px;
    }

    .contact {
      color: var(--ink-soft);
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .blurb {
      background: #F7F5F1;
      border: 1px solid var(--border);
      padding: 18px;
      border-radius: 12px;
      color: var(--ink-soft);
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 40px;
      margin-top: 32px;
    }

    .entry {
      background: #FFFEFC;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .skill-tags span {
      background: var(--green-bg);
      color: var(--green);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      border: 1px solid var(--green);
    }

    .resume-btn {
      display: inline-block;
      margin-top: 20px;
      background: var(--green);
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      nav {
        padding: 0 1rem;
      }

      .top-section {
        grid-template-columns: 1fr;
      }

      .content-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 34px;
      }

      .membership-btn {
        padding: 7px 12px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html" class="nav-logo">Talent<span>Match</span></a>

  <div class="nav-actions">
    <button id="membershipBtn" class="membership-btn" onclick="becomeCandidateMember()">
      Become a Member
    </button>

    <a href="PhoneLogin.html" class="back-link">← Login</a>
  </div>
</nav>

<main class="profile-page">
  <div class="profile-card">

    <section class="top-section">
      <div class="photo-box" id="photoBox">
        <div class="placeholder">🖼️</div>
      </div>

      <div>
        <h1 id="name">Loading...</h1>

        <div class="contact">
          <div id="email"></div>
          <div id="phone"></div>
        </div>

        <div class="blurb" id="blurb"></div>

        <a id="resume" class="resume-btn" target="_blank" style="display:none;">
          Download Resume
        </a>
      </div>
    </section>

    <div class="content-grid">
      <div>
        <h2>Education</h2>
        <div id="education"></div>

        <h2>Experience</h2>
        <div id="experience"></div>
      </div>

      <div>
        <h2>Preferred Location</h2>
        <div class="skill-tags">
          <span id="preferredLocation"></span>
        </div>

        <br />

        <h2>Preferred Mode</h2>
        <div class="skill-tags">
          <span id="workingMode"></span>
        </div>

        <br />

        <h2>Skills</h2>
        <div class="skill-tags" id="skills"></div>
      </div>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://bzakjtfktgdlmmevbnfo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6YWtqdGZrdGdkbG1tZXZibmZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDQwMzYsImV4cCI6MjA5MzQyMDAzNn0.z6aTOm35-BLJ43B_rUknD8yilNu-jkOId6RcR68U-B0"
);

// Get candidate ID from URL
function getId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

function setMembershipButtonAsMember() {
  const membershipBtn = document.getElementById("membershipBtn");
  membershipBtn.textContent = "You are a Member";
  membershipBtn.classList.add("active");
  membershipBtn.disabled = true;
}

function setMembershipButtonAsNonMember() {
  const membershipBtn = document.getElementById("membershipBtn");
  membershipBtn.textContent = "Become a Member";
  membershipBtn.classList.remove("active");
  membershipBtn.disabled = false;
}

async function loadMembershipStatus() {
  const id = getId();

  if (!id) {
    return;
  }

  const { data, error } = await supabaseClient
    .from("candidate")
    .select("is_member")
    .eq("candidate_id", id)
    .single();

  if (error) {
    console.error("Error loading membership status:", error);
    return;
  }

  if (data.is_member === true) {
    setMembershipButtonAsMember();
  } else {
    setMembershipButtonAsNonMember();
  }
}

async function becomeCandidateMember() {
  const id = getId();

  if (!id) {
    alert("No candidate profile ID found.");
    return;
  }

  const { error } = await supabaseClient
    .from("candidate")
    .update({ is_member: true })
    .eq("candidate_id", id);

  if (error) {
    console.error("Error updating membership:", error);
    alert("Could not activate membership.");
    return;
  }

  setMembershipButtonAsMember();
}

async function loadProfile() {
  const id = getId();

  if (!id) {
    alert("No profile ID found.");
    return;
  }

  // Candidate
  const { data: candidate, error: candidateError } = await supabaseClient
    .from("candidate")
    .select("*")
    .eq("candidate_id", id)
    .single();

  if (candidateError) {
    console.error("Error loading candidate:", candidateError);
    alert("Could not load candidate profile.");
    return;
  }

  document.getElementById("name").textContent = candidate.name || "No name provided";
  document.getElementById("email").textContent = candidate.email || "No email provided";
  document.getElementById("phone").textContent = candidate.phone || "No phone provided";
  document.getElementById("blurb").textContent = candidate.blurb || "No profile summary provided.";

  if (candidate.profile_photo_url) {
    document.getElementById("photoBox").innerHTML =
      `<img src="${candidate.profile_photo_url}" alt="Candidate profile photo">`;
  }

  if (candidate.resume_url) {
    const resume = document.getElementById("resume");
    resume.href = candidate.resume_url;
    resume.style.display = "inline-block";
  }

  document.getElementById("preferredLocation").textContent =
    candidate.preferred_location || "Not specified";

  document.getElementById("workingMode").textContent =
    candidate.working_mode || "Not specified";

  // Education
  const { data: education, error: educationError } = await supabaseClient
    .from("education")
    .select("*")
    .eq("candidate_id", id);

  if (educationError) {
    console.error("Error loading education:", educationError);
  } else {
    document.getElementById("education").innerHTML =
      education.length > 0
        ? education.map(e => `
            <div class="entry">
              <strong>${e.degree || "Degree not specified"}</strong>
              <div>${e.level || ""}</div>
            </div>
          `).join("")
        : `<div class="entry">No education added.</div>`;
  }

  // Experience
  const { data: experience, error: experienceError } = await supabaseClient
    .from("experience")
    .select("*")
    .eq("candidate_id", id);

  if (experienceError) {
    console.error("Error loading experience:", experienceError);
  } else {
    document.getElementById("experience").innerHTML =
      experience.length > 0
        ? experience.map(e => `
            <div class="entry">
              <strong>${e.job_title || "Job title not specified"}</strong>
              <div>${e.company || ""}</div>
            </div>
          `).join("")
        : `<div class="entry">No experience added.</div>`;
  }

  // Skills
  const { data: skills, error: skillsError } = await supabaseClient
    .from("skill")
    .select("*")
    .eq("candidate_id", id);

  if (skillsError) {
    console.error("Error loading skills:", skillsError);
  } else {
    document.getElementById("skills").innerHTML =
      skills.length > 0
        ? skills.map(s => `<span>${s.skill_name}</span>`).join("")
        : `<span>Not specified</span>`;
  }
}

loadProfile();
loadMembershipStatus();
</script>

</body>
</html>
