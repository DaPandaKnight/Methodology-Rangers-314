<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create an Employer Account — TalentMatch</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F1EC;
      --bg-card: #FDFCFA;
      --ink: #1A1A18;
      --ink-soft: #5C5C54;
      --green: #1A7F5A;
      --green-bg: #E8F5EF;
      --border: rgba(26,26,24,0.1);
      --border-md: rgba(26,26,24,0.18);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
    }

    nav {
      position: sticky;
      top: 0;
      background: rgba(244,241,236,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      height: 60px;
      z-index: 10;
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      text-decoration: none;
      color: var(--ink);
    }

    .nav-logo span { color: var(--green); }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
    }

    .page {
      max-width: 1050px;
      margin: 70px auto;
      padding: 0 2rem 80px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .page-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 40px;
      margin: 12px 0;
    }

    .page-header p {
      color: var(--ink-soft);
      max-width: 650px;
      margin: auto;
      font-size: 15px;
      line-height: 1.6;
    }

    .form-box {
      background: var(--bg-card);
      border: 1px solid var(--border-md);
      border-radius: 16px;
      padding: 32px;
    }

    .form-card {
      padding: 28px 0;
      border-bottom: 1px solid var(--border-md);
    }

    .form-card:first-child { padding-top: 0; }
    .form-card:last-child { border-bottom: none; padding-bottom: 0; }

    h2 {
      margin-bottom: 18px;
      font-size: 20px;
      font-weight: 500;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--ink-soft);
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border-md);
      background: #F7F5F1;
      font-family: 'DM Sans', sans-serif;
    }

    textarea { resize: vertical; }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .logo-upload {
      text-align: center;
      background: var(--green-bg);
      border-radius: 12px;
      padding: 22px;
      border: 1px dashed var(--border-md);
      margin-top: 12px;
    }

    .logo-placeholder {
      width: 120px;
      height: 100px;
      margin: 0 auto 12px;
      background: var(--bg-card);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      overflow: hidden;
    }

    .logo-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    button {
      border: 1px solid var(--border-md);
      background: white;
      border-radius: 20px;
      padding: 9px 16px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    button:hover {
      color: var(--green);
      border-color: var(--green);
    }

    .submit-btn {
      margin-top: 30px;
      width: 100%;
      background: var(--green);
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-weight: 500;
    }

    .small-note {
      color: var(--ink-soft);
      font-size: 13px;
      margin-top: 8px;
    }

    @media (max-width: 768px) {
      .two-column {
        grid-template-columns: 1fr;
      }

      .page-header h1 {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html" class="nav-logo">Talent<span>Match</span></a>
  <a href="index.html" class="back-link">← Back</a>
</nav>

<main class="page">

  <section id="companyAccountPage">
    <div class="page-header">
      <h1>Create A Company Account</h1>
      <p>Enter your company details first. Once the employer account is created, you can continue to create a job listing.</p>
    </div>

    <form class="form-box" onsubmit="createCompanyAccount(event)">

      <section class="form-card">
        <h2>Company Details</h2>

        <div class="two-column">
          <div>
            <label>Company Name</label>
            <input type="text" id="companyName" required>
          </div>

          <div>
            <label>Industry</label>
            <select id="companyIndustry" required>
              <option value="">Select industry</option>
              <option>Information Technology</option>
              <option>Finance</option>
              <option>Healthcare</option>
              <option>Education</option>
              <option>Engineering</option>
              <option>Marketing</option>
              <option>Government</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <label>Company Website</label>
        <input type="url" id="companyWebsite" placeholder="https://example.com">

        <label>Company Location</label>
        <input type="text" id="companyLocation" placeholder="Wollongong, NSW">
      </section>

      <section class="form-card">
        <h2>Employer Contact</h2>

        <div class="two-column">
          <div>
            <label>Contact Full Name</label>
            <input type="text" id="contactName" required>
          </div>

          <div>
            <label>Position / Role</label>
            <input type="text" id="contactPosition" placeholder="Hiring Manager">
          </div>
        </div>

        <div class="two-column">
          <div>
            <label>Email</label>
            <input type="email" id="contactEmail" required>
          </div>

          <div>
            <label>Phone Number</label>
            <input type="tel" id="contactPhone">
          </div>
        </div>
      </section>

      <section class="form-card">
        <h2>Company Logo</h2>
        <p class="small-note">Upload a logo to display with your job listings.</p>

        <div class="logo-upload">
          <div class="logo-placeholder" id="logoPreview">🏢</div>
          <input type="file" id="companyLogo" accept="image/*">
        </div>
      </section>

      <section class="form-card">
        <h2>Company Description</h2>
        <textarea id="companyDescription" rows="5" placeholder="Briefly describe the company, workplace culture, and what candidates should know."></textarea>
      </section>

      <button type="submit" class="submit-btn">
        Create Account
      </button>

    </form>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
  const supabaseClient = supabase.createClient(
    "https://bzakjtfktgdlmmevbnfo.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6YWtqdGZrdGdkbG1tZXZibmZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDQwMzYsImV4cCI6MjA5MzQyMDAzNn0.z6aTOm35-BLJ43B_rUknD8yilNu-jkOId6RcR68U-B0"
  );

  const COMPANY_BUCKET = "company-files";

  document.getElementById("companyLogo").addEventListener("change", function(event) {
    const file = event.target.files[0];

    if (file) {
      const reader = new FileReader();

      reader.onload = function(e) {
        document.getElementById("logoPreview").innerHTML =
          `<img src="${e.target.result}" alt="Company logo preview">`;
      };

      reader.readAsDataURL(file);
    }
  });

  async function uploadCompanyLogo(file) {
    if (!file) return null;

    const fileExt = file.name.split(".").pop();
    const fileName = `logos/${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;

    const { error } = await supabaseClient.storage
      .from(COMPANY_BUCKET)
      .upload(fileName, file);

    if (error) {
      console.error("Logo upload error:", error);
      alert("Logo upload failed.");
      return null;
    }

    const { data } = supabaseClient.storage
      .from(COMPANY_BUCKET)
      .getPublicUrl(fileName);

    return data.publicUrl;
  }

  async function createCompanyAccount(event) {
    event.preventDefault();

    const companyName = document.getElementById("companyName").value.trim();
    const industry = document.getElementById("companyIndustry").value;
    const website = document.getElementById("companyWebsite").value.trim();
    const location = document.getElementById("companyLocation").value.trim();
    const description = document.getElementById("companyDescription").value.trim();

    const contactName = document.getElementById("contactName").value.trim();
    const contactPosition = document.getElementById("contactPosition").value.trim();
    const contactEmail = document.getElementById("contactEmail").value.trim();
    const contactPhone = document.getElementById("contactPhone").value.trim();

    const logoFile = document.getElementById("companyLogo").files[0];

    if (!companyName || !industry || !contactName || !contactEmail) {
      alert("Please complete the required company and contact fields.");
      return;
    }

    const logoUrl = await uploadCompanyLogo(logoFile);

    const { data: company, error: companyError } = await supabaseClient
      .from("company")
      .insert([{
        name: companyName,
        industry: industry,
        website: website,
        location: location,
        logo_url: logoUrl,
        description: description
      }])
      .select()
      .single();

    if (companyError) {
      console.error("Company insert error:", companyError);
      alert("Error creating company account. Check if the company name already exists.");
      return;
    }

    const { error: contactError } = await supabaseClient
      .from("contact")
      .insert([{
        company_id: company.company_id,
        full_name: contactName,
        position: contactPosition,
        email: contactEmail,
        phone_number: contactPhone
      }]);

    if (contactError) {
      console.error("Contact insert error:", contactError);
      alert("Company was created, but contact details failed to save.");
      return;
    }

    alert("Company account created successfully.");

    window.location.href = `employer.html?id=${company.company_id}`;
  }
</script>

</body>
</html>
