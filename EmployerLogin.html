<!DOCTYPE html>
<html lang="en">
<head>

  <title>Login — TalentMatch</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F1EC;
      --bg-card: #FDFCFA;
      --ink: #1A1A18;
      --ink-soft: #5C5C54;
      --green: #1A7F5A;
      --green-bg: #E8F5EF;
      --border: rgba(26,26,24,0.1);
      --border-md: rgba(26,26,24,0.18);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-md);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: var(--ink-soft);
      margin-bottom: 25px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-md);
      background: #F7F5F1;
      margin-bottom: 15px;
      font-family: 'DM Sans', sans-serif;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: var(--green);
      color: white;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
    }

    button:hover {
      opacity: 0.9;
    }

    .link {
      margin-top: 15px;
      font-size: 13px;
    }

    .link a {
      color: var(--green);
      text-decoration: none;
    }
  </style>
</head>
