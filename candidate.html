<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Profile — TalentMatch</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F1EC;
      --bg-card: #FDFCFA;
      --ink: #1A1A18;
      --ink-soft: #5C5C54;
      --green: #1A7F5A;
      --green-bg: #E8F5EF;
      --border: rgba(26,26,24,0.1);
      --border-md: rgba(26,26,24,0.18);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
    }

    nav {
      position: sticky;
      top: 0;
      background: rgba(244,241,236,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      height: 60px;
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      text-decoration: none;
      color: var(--ink);
    }

    .nav-logo span { color: var(--green); }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
    }

    .profile-page {
      max-width: 1000px;
      margin: 70px auto;
      padding: 0 2rem 80px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .page-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 40px;
      margin: 12px 0;
    }

    .page-header p {
      color: var(--ink-soft);
      max-width: 600px;
      margin: auto;
      font-size: 15px;
    }

    .profile-form {
      background: var(--bg-card);
      border: 1px solid var(--border-md);
      border-radius: 16px;
      padding: 32px;
    }

    .form-card {
      padding: 28px 0;
      border-bottom: 1px solid var(--border-md);
    }

    .form-card:last-child {
      border-bottom: none;
    }

    .top-section {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 40px;
      align-items: center;
    }

    .photo-upload,
    .resume-upload {
      text-align: center;
      background: var(--green-bg);
      border-radius: 12px;
      padding: 22px;
      border: 1px dashed var(--border-md);
      margin-top: 12px;
    }

    .photo-placeholder {
      width: 120px;
      height: 100px;
      margin: 0 auto 12px;
      background: var(--bg-card);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    button {
      border: 1px solid var(--border-md);
      background: white;
      border-radius: 20px;
      padding: 8px 14px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    button:hover {
      color: var(--green);
      border-color: var(--green);
    }

    h2 {
      margin-bottom: 18px;
      font-size: 20px;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--ink-soft);
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border-md);
      background: #F7F5F1;
      font-family: 'DM Sans', sans-serif;
    }

    textarea { resize: vertical; }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .entry-set {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
      background: #FFFEFC;
    }

    .add-btn {
      margin-top: 8px;
    }

    .skill-tags {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .skill-tags span {
      background: var(--green-bg);
      color: var(--green);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      border: 1px solid var(--green);
    }

    .submit-btn {
      margin-top: 30px;
      width: 100%;
      background: var(--green);
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .top-section,
      .two-column {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<nav>
  <a href="#" class="nav-logo">Talent<span>Match</span></a>
  <a href="#" class="back-link">← Back</a>
</nav>

<main class="profile-page">

  <div class="page-header">
    <h1>Create A Profile</h1>
    <p>Enter your details so employers can understand your background and skills.</p>
  </div>

  <form class="profile-form">

    <section class="form-card top-section">
      <div class="photo-upload">
        <div class="photo-placeholder">🖼️</div>
        <input type="file" accept="image/*">
      </div>

      <div>
        <label>Full Name</label>
        <input type="text">

        <label>Email</label>
        <input type="email">

        <label>Phone Number</label>
        <input type="tel">
      </div>
    </section>

    <section class="form-card">
      <h2>Education</h2>

      <div id="educationContainer">
        <div class="entry-set">
          <label>Level of qualification</label>
          <input type="text">

          <label>Qualification title</label>
          <input type="text">

          <div class="two-column">
            <div>
              <label>Start Date</label>
              <input type="date">
            </div>
            <div>
              <label>Completion Date</label>
              <input type="date">
            </div>
          </div>
        </div>
      </div>

      <button type="button" class="add-btn" onclick="addEducation()">+ Add another education</button>
    </section>

    <section class="form-card">
      <h2>Experience</h2>

      <div id="experienceContainer">
        <div class="entry-set">
          <label>Job title</label>
          <input type="text">

          <label>Company Name</label>
          <input type="text">

          <div class="two-column">
            <div>
              <label>Start Date</label>
              <input type="date">
            </div>
            <div>
              <label>End Date</label>
              <input type="date">
            </div>
          </div>
        </div>
      </div>

      <button type="button" class="add-btn" onclick="addExperience()">+ Add another experience</button>
    </section>

    <section class="form-card">
      <h2>Skills</h2>

      <div class="skill-tags">
        <span>Problem Solving</span>
        <span>HTML</span>
      </div>

      <select>
        <option>Select skill</option>
        <option>JavaScript</option>
        <option>Python</option>
        <option>Java</option>
        <option>C++</option>
        <option>SQL</option>
        <option>React</option>
        <option>CSS</option>
        <option>Communication</option>
        <option>Teamwork</option>
        <option>Leadership</option>
        <option>Time Management</option>
        <option>Critical Thinking</option>
        <option>Project Management</option>
      </select>
    </section>

    <section class="form-card">
      <h2>Personal Blurb (optional)</h2>
      <textarea rows="5"></textarea>
    </section>

    <section class="form-card">
      <h2>Upload Resume</h2>
      <p style="color: var(--ink-soft); font-size: 14px;">Upload your resume as a PDF or Word document.</p>

      <div class="resume-upload">
        <input type="file" accept=".pdf,.doc,.docx">
      </div>
    </section>

    <button class="submit-btn">Create Profile</button>

  </form>
</main>

<script>
  function addEducation() {
    const container = document.getElementById("educationContainer");

    const newEducation = document.createElement("div");
    newEducation.classList.add("entry-set");

    newEducation.innerHTML = `
      <label>Level of qualification</label>
      <input type="text">

      <label>Qualification title</label>
      <input type="text">

      <div class="two-column">
        <div>
          <label>Start Date</label>
          <input type="date">
        </div>
        <div>
          <label>Completion Date</label>
          <input type="date">
        </div>
      </div>
    `;

    container.appendChild(newEducation);
  }

  function addExperience() {
    const container = document.getElementById("experienceContainer");

    const newExperience = document.createElement("div");
    newExperience.classList.add("entry-set");

    newExperience.innerHTML = `
      <label>Job title</label>
      <input type="text">

      <label>Company Name</label>
      <input type="text">

      <div class="two-column">
        <div>
          <label>Start Date</label>
          <input type="date">
        </div>
        <div>
          <label>End Date</label>
          <input type="date">
        </div>
      </div>
    `;

    container.appendChild(newExperience);
  }
</script>

</body>
</html>
