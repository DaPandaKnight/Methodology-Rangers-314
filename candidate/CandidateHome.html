<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Home — TalentMatch</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/candidate-home.css" />
</head>

<body>

  <nav>
    <a href="../index.html" class="nav-logo">Talent<span>Match</span></a>

    <div class="nav-links">
      <a href="#" id="profileBtn" class="profile-btn">Profile</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <section class="hero">
    <span class="hero-eyebrow">Candidate Home</span>
    <h1>Find roles that <em>match your profile</em></h1>
    <p>Browse open positions and access your candidate profile using the same ID saved from your login.</p>
  </section>

  <div class="section-divider">
    <span>Open positions</span>
  </div>

  <section class="listings-section">
    <div class="listings-header">
      <div>
        <h2>Latest job listings</h2>
        <p id="results-count">Showing all open positions</p>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search by keyword, title, or skill…" />
      <button class="filter-btn active" data-mode="All">All</button>
      <button class="filter-btn" data-mode="Remote">Remote</button>
      <button class="filter-btn" data-mode="Hybrid">Hybrid</button>
      <button class="filter-btn" data-mode="On-site">On-site</button>
    </div>

    <div class="job-grid" id="job-grid"></div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    // ── Supabase client ──────────────────────────────────────
    const supabaseClient = supabase.createClient(
      "https://bzakjtfktgdlmmevbnfo.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6YWtqdGZrdGdkbG1tZXZibmZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDQwMzYsImV4cCI6MjA5MzQyMDAzNn0.z6aTOm35-BLJ43B_rUknD8yilNu-jkOId6RcR68U-B0"
    );

    // ── Profile button — link to logged-in candidate's profile
    const candidateId = localStorage.getItem("candidateId");
    const profileBtn = document.getElementById("profileBtn");
    profileBtn.href = candidateId
      ? `CandidateProfile.html?id=${candidateId}`
      : "CandidateLogin.html";

    // ── Logout ───────────────────────────────────────────────
    async function logout() {
      await supabaseClient.auth.signOut();
      localStorage.removeItem("candidateId");
      window.location.href = "../index.html";
    }

    // ── State ────────────────────────────────────────────────
    let allJobs = []   // full list from Supabase
    let activeMode = "All";
    let searchQuery = "";

    // ── Emoji based on job title ─────────────────────────────
    function jobEmoji(title) {
      const t = title.toLowerCase();
      if (t.includes("frontend") || t.includes("ui") || t.includes("ux")) return "💻";
      if (t.includes("backend") || t.includes("engineer")) return "⚙️";
      if (t.includes("data") || t.includes("analyst")) return "📊";
      if (t.includes("full stack") || t.includes("fullstack")) return "🌐";
      if (t.includes("design")) return "🎨";
      if (t.includes("devops") || t.includes("cloud")) return "☁️";
      if (t.includes("mobile")) return "📱";
      return "💼";
    }

    // ── "2 days ago" style date formatting ───────────────────
    function timeAgo(datetimeStr) {
      const diff = Date.now() - new Date(datetimeStr).getTime();
      const days = Math.floor(diff / 86400000);
      if (days === 0) return "Today";
      if (days === 1) return "1 day ago";
      if (days < 7) return `${days} days ago`;
      const weeks = Math.floor(days / 7);
      return `${weeks} week${weeks > 1 ? "s" : ""} ago`;
    }

    // ── Render jobs to the grid ───────────────────────────────
    function renderJobs() {
      const grid = document.getElementById("job-grid");
      const count = document.getElementById("results-count");

      // Client-side filter by work mode + keyword search
      const q = searchQuery.toLowerCase();
      const filtered = allJobs.filter(job => {
        const modeMatch = activeMode === "All" || job.mode === activeMode;
        const textMatch = !q ||
          job.title.toLowerCase().includes(q) ||
          job.description.toLowerCase().includes(q) ||
          job.skills.some(s => s.toLowerCase().includes(q)) ||
          job.company.toLowerCase().includes(q);
        return modeMatch && textMatch;
      });

      count.textContent = filtered.length === allJobs.length
        ? `Showing all ${allJobs.length} open positions`
        : `${filtered.length} of ${allJobs.length} positions`;

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <p>🔍</p>
            <p>No jobs match your search.</p>
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map(job => `
        <div class="job-card" onclick="alert('Job detail page coming soon!')">
          <div class="job-card-top">
            <div>
              <div class="job-title">${job.title}</div>
              <div class="company-name">${job.company}</div>
            </div>
            <div class="company-logo">${job.emoji}</div>
          </div>

          <div class="job-meta">
            <span class="badge badge-mode-${job.mode.replace(" ", "-")}">${job.mode}</span>
            <span class="badge badge-location">📍 ${job.location}</span>
            <span class="badge badge-exp">⏱ ${job.yearsExp}+ yr${job.yearsExp !== 1 ? "s" : ""}</span>
          </div>

          <p class="job-desc">${job.description}</p>

          <div class="skill-tags">
            ${job.skills.map(s => `<span class="skill-tag">${s}</span>`).join("")}
          </div>

          <div class="job-card-footer">
            <span class="posted-date">Posted ${job.posted}</span>
            <button class="btn-apply" onclick="event.stopPropagation(); alert('Apply flow coming soon!')">View role</button>
          </div>
        </div>
      `).join("");
    }

    // ── Show skeleton cards while loading ────────────────────
    function showLoading() {
      document.getElementById("job-grid").innerHTML = Array(4).fill(`
        <div class="job-card" style="opacity:0.35; pointer-events:none;">
          <div style="height:16px; background:var(--border-md); border-radius:4px; width:55%; margin-bottom:10px;"></div>
          <div style="height:12px; background:var(--border); border-radius:4px; width:35%; margin-bottom:18px;"></div>
          <div style="height:10px; background:var(--border); border-radius:4px; width:80%; margin-bottom:6px;"></div>
          <div style="height:10px; background:var(--border); border-radius:4px; width:65%;"></div>
        </div>`).join("");
    }

    // ── Fetch all open jobs from Supabase ────────────────────
    // Expects a "job" table joined with an "employer" table.
    // Adjust table/column names below to match yours exactly.
    async function loadJobs() {
      showLoading();
      try {
        const { data, error } = await supabaseClient
          .from("job_listing")
          .select(`
            job_id,
            job_title,
            job_description,
            required_education,
            required_skills,
            years_experience,
            work_mode,
            job_location,
            company_name,
            company_logo_url,
            created_at
          `)
          .order("created_at", { ascending: false });

        if (error) throw error;

        // Map Supabase rows → shape renderJobs() expects
        allJobs = data.map(j => ({
          id: j.job_id,
          title: j.job_title,
          company: j.company_name ?? "Unknown company",
          emoji: jobEmoji(j.job_title),
          description: j.job_description ?? "",
          education: j.required_education ?? "",
          // required_skills stored as CSV string e.g. "React, SQL, Git"
          skills: j.required_skills
            ? j.required_skills.split(",").map(s => s.trim()).filter(Boolean)
            : [],
          yearsExp: j.years_experience ?? 0,
          mode: j.work_mode ?? "On-site",
          location: j.job_location ?? "",
          posted: timeAgo(j.created_at)
        }));

        renderJobs();

      } catch (err) {
        console.error("Failed to load jobs:", err);
        document.getElementById("job-grid").innerHTML = `
          <div class="empty-state">
            <p>⚠️</p>
            <p>Could not load jobs. Please try again later.</p>
            <small style="font-size:11px; color:var(--ink-muted);">${err.message}</small>
          </div>`;
      }
    }

    // ── Filter buttons ────────────────────────────────────────
    document.querySelectorAll(".filter-btn").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        button.classList.add("active");
        activeMode = button.dataset.mode;
        renderJobs();  // filter client-side — no extra Supabase call needed
      });
    });

    // ── Search input ─────────────────────────────────────────
    document.getElementById("search-input").addEventListener("input", e => {
      searchQuery = e.target.value;
      renderJobs();
    });

    // ── Kick off ─────────────────────────────────────────────
    loadJobs();
  </script>

</body>

</html>
