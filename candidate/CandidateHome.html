<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Home — TalentMatch</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/candidate-home.css" />
  <style>
    .show-more-btn {
      display: block; margin: 28px auto 0; padding: 12px 36px;
      background: transparent; border: 1.5px solid var(--border-md);
      border-radius: 8px; font-size: 14px; font-weight: 500;
      font-family: inherit; color: var(--ink); cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .show-more-btn:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

    /* ── Filter bar ─────────────────────────────────────── */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 10px;
      margin-bottom: 14px; align-items: center;
    }
    .filter-bar select {
      padding: 7px 12px; border: 1.5px solid var(--border-md);
      border-radius: 8px; font-size: 13px; font-family: inherit;
      background: #fff; color: var(--ink); cursor: pointer;
      min-width: 160px;
    }
    .filter-bar select:focus { outline: none; border-color: var(--ink); }
    .filter-bar .clear-btn {
      padding: 7px 14px; border: 1.5px solid var(--border-md);
      border-radius: 8px; font-size: 13px; font-family: inherit;
      background: transparent; color: var(--ink-soft); cursor: pointer;
    }
    .filter-bar .clear-btn:hover { border-color: var(--ink); color: var(--ink); }
  </style>
</head>

<body>

  <nav>
    <a href="../index.html" class="nav-logo">Talent<span>Match</span></a>
    <div class="nav-links">
      <a href="#" id="profileBtn" class="profile-btn">Profile</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <section class="hero">
    <span class="hero-eyebrow">Candidate Home</span>
    <h1>Find roles that <em>match your profile</em></h1>
    <p>Browse open positions and access your candidate profile using the same ID saved from your login.</p>
  </section>

  <div class="section-divider"><span>Open positions</span></div>

  <section class="listings-section">
    <div class="listings-header">
      <div>
        <h2>Latest job listings</h2>
        <p id="results-count">Showing all open positions</p>
      </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search by keyword, title, skill…" />
      <button class="filter-btn" id="btn-talentmatch">TalentMatch</button>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <select id="filter-mode" onchange="onFilterChange()">
        <option value="">All work modes</option>
        <option value="Remote">Remote</option>
        <option value="Hybrid">Hybrid</option>
        <option value="On-site">On-site</option>
      </select>

      <select id="filter-location" onchange="onFilterChange()">
        <option value="">All locations</option>
      </select>

      <select id="filter-title" onchange="onFilterChange()">
        <option value="">All job titles</option>
      </select>

      <button class="clear-btn" onclick="clearFilters()">Clear filters</button>
    </div>

    <div class="job-grid" id="job-grid"></div>
    <div id="show-more-container" style="display:none; text-align:center; margin-top:28px;">
      <button id="show-more-btn" class="show-more-btn"></button>
    </div>
  </section>

  <!-- Fuse.js for fuzzy search -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    const supabaseClient = supabase.createClient(
      "https://bzakjtfktgdlmmevbnfo.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6YWtqdGZrdGdkbG1tZXZibmZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDQwMzYsImV4cCI6MjA5MzQyMDAzNn0.z6aTOm35-BLJ43B_rUknD8yilNu-jkOId6RcR68U-B0"
    );

    const candidateId = localStorage.getItem("candidateId");
    const profileBtn  = document.getElementById("profileBtn");
    profileBtn.href   = candidateId ? `CandidateProfile.html?id=${candidateId}` : "CandidateLogin.html";

    async function logout() {
      await supabaseClient.auth.signOut();
      localStorage.removeItem("candidateId");
      window.location.href = "../index.html";
    }

    const PAGE_SIZE = 24;

    let allJobs      = [];   
    let filteredJobs = [];
    let visibleCount = PAGE_SIZE;
    let isMember       = false;
    let topSearch      = false;
    let fuseInstance   = null;  // Fuse.js index — rebuilt whenever the active set changes
    let profile        = null;  // cached candidate profile (set in init)
    let topMatchedJobs = null;  // scored & sorted results from loadTopJobs

    // ── Active filter state ──────────────────────────────────
    let filterMode     = "";
    let filterLocation = "";
    let filterTitle    = "";
    let searchQuery    = "";

    // ── Populate location + title dropdowns ──────────────────
    function buildDropdowns(jobs) {
      const locations = [...new Set(jobs.map(j => j.location).filter(Boolean))].sort();
      const titles    = [...new Set(jobs.map(j => j.title).filter(Boolean))].sort();

      const locSel = document.getElementById("filter-location");
      const titSel = document.getElementById("filter-title");

      locations.forEach(l => {
        const o = document.createElement("option");
        o.value = l; o.textContent = l;
        locSel.appendChild(o);
      });
      titles.forEach(t => {
        const o = document.createElement("option");
        o.value = t; o.textContent = t;
        titSel.appendChild(o);
      });
    }

    // ── Build Fuse index ─────────────────────────────────────
    function buildFuse(jobs) {
      fuseInstance = new Fuse(jobs, {
        threshold:      0.4,   // 0 = exact, 1 = match anything
        ignoreLocation: true,
        keys: [
          { name: "title",       weight: 3 },
          { name: "skills",      weight: 2 },
          { name: "company",     weight: 1 },
          { name: "location",    weight: 1 },
          { name: "description", weight: 0.5 }
        ]
      });
    }

    // ── Apply search + all filters ────────────────────────────
    // sourceJobs is either allJobs (normal) or topMatchedJobs (TalentMatch active)
    function applyFilters(sourceJobs) {
      let results = sourceJobs;

      // 1. Keyword / fuzzy search
      if (searchQuery.trim()) {
        // First try exact substring match across key fields
        const q = searchQuery.toLowerCase();
        const exact = sourceJobs.filter(j =>
          j.title.toLowerCase().includes(q) ||
          j.company.toLowerCase().includes(q) ||
          j.location.toLowerCase().includes(q) ||
          j.description.toLowerCase().includes(q) ||
          j.skills.some(s => s.toLowerCase().includes(q))
        );
        // If exact gives results use them, otherwise fall back to Fuse fuzzy
        if (exact.length > 0) {
          results = exact;
        } else if (fuseInstance) {
          results = fuseInstance.search(searchQuery).map(r => r.item);
        } else {
          results = [];
        }
      }

      // 2. Work mode filter
      if (filterMode)     results = results.filter(j => j.mode === filterMode);

      // 3. Location filter
      if (filterLocation) results = results.filter(j => j.location === filterLocation);

      // 4. Job title filter
      if (filterTitle)    results = results.filter(j => j.title === filterTitle);

      return results;
    }

    function onFilterChange() {
      filterMode     = document.getElementById("filter-mode").value;
      filterLocation = document.getElementById("filter-location").value;
      filterTitle    = document.getElementById("filter-title").value;
      visibleCount   = PAGE_SIZE;
      renderJobs();
    }

    function clearFilters() {
      document.getElementById("filter-mode").value     = "";
      document.getElementById("filter-location").value = "";
      document.getElementById("filter-title").value    = "";
      document.getElementById("search-input").value    = "";
      filterMode = filterLocation = filterTitle = searchQuery = "";
      visibleCount = PAGE_SIZE;
      renderJobs();
    }

    // ── Helpers ──────────────────────────────────────────────
    function jobEmoji(title) {
      const t = title.toLowerCase();
      if (t.includes("frontend") || t.includes("ui") || t.includes("ux")) return "💻";
      if (t.includes("backend") || t.includes("engineer")) return "⚙️";
      if (t.includes("data") || t.includes("analyst")) return "📊";
      if (t.includes("full stack") || t.includes("fullstack")) return "🌐";
      if (t.includes("design")) return "🎨";
      if (t.includes("devops") || t.includes("cloud")) return "☁️";
      if (t.includes("mobile")) return "📱";
      return "💼";
    }

    function timeAgo(datetimeStr) {
      const diff  = Date.now() - new Date(datetimeStr).getTime();
      const days  = Math.floor(diff / 86400000);
      if (days === 0) return "Today";
      if (days === 1) return "1 day ago";
      if (days < 7)   return `${days} days ago`;
      const weeks = Math.floor(days / 7);
      return `${weeks} week${weeks > 1 ? "s" : ""} ago`;
    }

    function jobCardHTML(job) {
      return `
        <div class="job-card" onclick="alert('Job detail page coming soon!')">
          <div class="job-card-top">
            <div>
              <div class="job-title">${job.title}</div>
              <div class="company-name">${job.company}</div>
            </div>
            <div class="company-logo">${job.emoji}</div>
          </div>
          <div class="job-meta">
            <span class="badge badge-mode-${job.mode.replace(" ", "-")}">${job.mode}</span>
            <span class="badge badge-location">📍 ${job.location}</span>
            <span class="badge badge-exp">⏱ ${job.yearsExp}+ yr${job.yearsExp !== 1 ? "s" : ""}</span>
          </div>
          <p class="job-desc">${job.description}</p>
          <div class="skill-tags">
            ${job.skills.map(s => `<span class="skill-tag">${s}</span>`).join("")}
          </div>
          <div class="job-card-footer">
            <span class="posted-date">Posted ${job.posted}</span>
            <button class="btn-apply" onclick="event.stopPropagation(); alert('Apply flow coming soon!')">View role</button>
          </div>
        </div>`;
    }

    // ── Render helpers ───────────────────────────────────────
    function setShowMore(remaining) {
      const container = document.getElementById("show-more-container");
      const btn       = document.getElementById("show-more-btn");
      if (remaining > 0) {
        btn.textContent      = `Show more (${remaining} remaining)`;
        container.style.display = "block";
      } else {
        container.style.display = "none";
      }
    }

    function emptyState(msg) {
      document.getElementById("job-grid").innerHTML = `
        <div class="empty-state"><p>🔍</p><p>${msg}</p></div>`;
      document.getElementById("show-more-container").style.display = "none";
    }

    // ── Member render (paginated, searches all records) ──────
    function renderJobs() {
      const count  = document.getElementById("results-count");
      const source = (topSearch && topMatchedJobs) ? topMatchedJobs : allJobs;
      filteredJobs = applyFilters(source);

      const slice     = filteredJobs.slice(0, visibleCount);
      const remaining = filteredJobs.length - slice.length;

      if (topSearch && topMatchedJobs) {
        const cap = isMember ? "" : " · non-members see top 10";
        count.textContent = filteredJobs.length === topMatchedJobs.length
          ? `${filteredJobs.length} TalentMatch result${filteredJobs.length !== 1 ? "s" : ""}${cap}`
          : `${filteredJobs.length} of ${topMatchedJobs.length} TalentMatch results${cap}`;
      } else {
        count.textContent = filteredJobs.length === allJobs.length
          ? `Showing ${slice.length} of ${allJobs.length} open positions`
          : `${filteredJobs.length} of ${allJobs.length} positions match`;
      }

      if (filteredJobs.length === 0) { emptyState("No jobs match your search or filters."); return; }

      document.getElementById("job-grid").innerHTML = slice.map(jobCardHTML).join("");
      setShowMore(remaining);
    }

    function showLoading() {
      document.getElementById("job-grid").innerHTML = Array(4).fill(`
        <div class="job-card" style="opacity:0.35; pointer-events:none;">
          <div style="height:16px; background:var(--border-md); border-radius:4px; width:55%; margin-bottom:10px;"></div>
          <div style="height:12px; background:var(--border); border-radius:4px; width:35%; margin-bottom:18px;"></div>
          <div style="height:10px; background:var(--border); border-radius:4px; width:80%; margin-bottom:6px;"></div>
          <div style="height:10px; background:var(--border); border-radius:4px; width:65%;"></div>
        </div>`).join("");
    }

    // ── Scoring (unchanged) ──────────────────────────────────
    function eduTier(str) {
      if (!str) return 0;
      const s = str.toLowerCase();
      if (s.includes("phd") || s.includes("doctor"))              return 6;
      if (s.includes("master"))                                    return 5;
      if (s.includes("graduate"))                                  return 4;
      if (s.includes("bachelor") || s.includes("degree"))         return 3;
      if (s.includes("advanced diploma"))                          return 2;
      if (s.includes("diploma") || s.includes("associate"))       return 2;
      if (s.includes("cert"))                                      return 1;
      return 0;
    }

    function calcYearsExperience(rows) {
      const now = new Date(); let ms = 0;
      for (const r of rows) {
        const s = r.start_date ? new Date(r.start_date) : null;
        const e = r.end_date   ? new Date(r.end_date)   : now;
        if (s && e > s) ms += (e - s);
      }
      return ms / (1000 * 60 * 60 * 24 * 365.25);
    }

    function extractFieldKeywords(degreeStr) {
      if (!degreeStr) return [];
      return degreeStr.toLowerCase()
        .replace(/\(.*?\)/g, ' ')
        .replace(/\bmaster\b|\bmasters\b|\bbachelor\b|\bbachelors\b|\bdoctor\b|\bdoctoral\b|\bphd\b|\bdiploma\b|\bcertificate\b|\bgraduate\b|\bassociate\b|\badvanced\b|\bof\b|\bin\b|\bthe\b/g, ' ')
        .split(/[\s,/&()\-]+/)
        .map(w => w.trim())
        .filter(w => w.length > 2);
    }

    function educationSatisfied(degrees, req, candidateEduTier, jobEduTier) {
      if (!req) return true;
      const r = req.toLowerCase();
      return degrees.some(d => {
        const dl = d.toLowerCase();
        if (dl.includes(r) || r.includes(dl)) return true;
        if (candidateEduTier >= jobEduTier && jobEduTier > 0) {
          const candidateKeywords = extractFieldKeywords(d);
          const reqKeywords       = extractFieldKeywords(req);
          return reqKeywords.some(rk => candidateKeywords.some(ck => ck.includes(rk) || rk.includes(ck)));
        }
        return false;
      });
    }

    function scoreJob(job, profile) {
      if (!educationSatisfied(profile.degrees, job.requiredEducation, profile.eduTier, job.eduTier)) return null;
      if (profile.yearsExperience < job.yearsExp) return null;
      let score = 0;
      if (profile.pastJobTitles.length > 0 && job.title) {
        const jt = job.title.toLowerCase();
        if (profile.pastJobTitles.some(pt => pt.toLowerCase().split(/\s+/).some(w => w.length > 2 && jt.includes(w)))) score += 5;
      }
      if (profile.degrees.length > 0 && job.requiredEducation) {
        const req = job.requiredEducation.toLowerCase();
        const reqKeywords = extractFieldKeywords(job.requiredEducation);
        const hasMatch = profile.degrees.some(d => {
          const dl = d.toLowerCase();
          if (dl.includes(req) || req.includes(dl)) return true;
          if (profile.eduTier >= job.eduTier && job.eduTier > 0) {
            const ck = extractFieldKeywords(d);
            return reqKeywords.some(rk => ck.some(c => c.includes(rk) || rk.includes(c)));
          }
          return false;
        });
        if (hasMatch) score += 4;
      }
      if (profile.eduTier > 0 && job.eduTier > 0) { if (profile.eduTier >= job.eduTier) score += 3; }
      else if (job.eduTier === 0) score += 3;
      if (job.yearsExp === 0 || profile.yearsExperience >= job.yearsExp) score += 3;
      if (profile.preferredLocation && job.location) {
        const cl = profile.preferredLocation.toLowerCase(), jl = job.location.toLowerCase();
        if (cl.includes(jl) || jl.includes(cl)) score += 2;
      }
      if (profile.workingMode && job.mode && profile.workingMode.toLowerCase() === job.mode.toLowerCase()) score += 2;
      if (profile.skills.length > 0 && job.skills.length > 0) {
        const cs = profile.skills.map(s => s.toLowerCase());
        const js = job.skills.map(s => s.toLowerCase());
        if (js.some(j => cs.some(c => c.includes(j) || j.includes(c)))) score += 1;
      }
      return score;
    }

    async function fetchCandidateProfile() {
      const { data: cand, error: cErr } = await supabaseClient.from("candidate").select("working_mode, preferred_location, is_member").eq("candidate_id", candidateId).single();
      if (cErr) throw cErr;
      isMember = cand.is_member ?? false;
      const { data: skills }    = await supabaseClient.from("skill").select("skill_name").eq("candidate_id", candidateId);
      const { data: education } = await supabaseClient.from("education").select("level, degree").eq("candidate_id", candidateId);
      const { data: experience }= await supabaseClient.from("experience").select("job_title, start_date, end_date").eq("candidate_id", candidateId);
      return {
        workingMode:       cand.working_mode ?? "",
        preferredLocation: cand.preferred_location ?? "",
        skills:            skills     ? skills.map(s => s.skill_name.trim()).filter(Boolean) : [],
        eduTier:           education && education.length > 0 ? Math.max(...education.map(e => eduTier(e.level))) : 0,
        degrees:           education  ? education.map(e => e.degree).filter(Boolean) : [],
        yearsExperience:   experience ? calcYearsExperience(experience) : 0,
        pastJobTitles:     experience ? experience.map(e => e.job_title).filter(Boolean) : []
      };
    }

    function mapJob(j) {
      return {
        id:                j.job_id,
        title:             j.job_title,
        company:           j.company_name ?? "Unknown company",
        emoji:             jobEmoji(j.job_title),
        description:       j.job_description ?? "",
        education:         j.required_education ?? "",
        skills:            j.required_skills ? j.required_skills.split(",").map(s => s.trim()).filter(Boolean) : [],
        yearsExp:          j.years_experience ?? 0,
        mode:              j.work_mode ?? "On-site",
        location:          j.job_location ?? "",
        eduTier:           eduTier(j.required_education),
        requiredEducation: j.required_education ?? "",
        posted:            timeAgo(j.created_at)
      };
    }

    async function loadTopJobs(profile) {
      const { data, error } = await supabaseClient.from("job_listing").select("job_id,job_title,job_description,required_education,required_skills,years_experience,work_mode,job_location,company_name,company_logo_url,created_at").order("created_at", { ascending: false });
      if (error) throw error;
      const scored = data.map(j => { const job = mapJob(j); job.score = scoreJob(job, profile); return job; });
      const eligible = scored.filter(j => j.score !== null);
      eligible.sort((a, b) => b.score - a.score);
      if (isMember) return eligible; else return eligible.slice(0, 10);
    }


    // ── Member flow ──────────────────────────────────────────
    async function init() {
      showLoading();
      try {
        profile = await fetchCandidateProfile();
        const { data, error } = await supabaseClient.from("job_listing").select("job_id,job_title,job_description,required_education,required_skills,years_experience,work_mode,job_location,company_name,company_logo_url,created_at").order("created_at", { ascending: false });
        if (error) throw error;
        allJobs = data.map(mapJob);
        buildFuse(allJobs);
        buildDropdowns(allJobs);
        renderJobs();
      } catch (err) {
        console.error(err);
        document.getElementById("job-grid").innerHTML = `<div class="empty-state"><p>⚠️</p><p>Could not load jobs.</p><small>${err.message}</small></div>`;
      }
    }

    // ── Show More ────────────────────────────────────────────
    document.getElementById("show-more-btn").addEventListener("click", () => {
      visibleCount += PAGE_SIZE;
      renderJobs();
    });

    // ── Search input ─────────────────────────────────────────
    document.getElementById("search-input").addEventListener("input", e => {
      searchQuery  = e.target.value;
      visibleCount = PAGE_SIZE;
      renderJobs();
    });

    // ── TalentMatch button ───────────────────────────────────
    document.getElementById("btn-talentmatch").addEventListener("click", async () => {
      if (!profile) return; // profile not yet loaded
      const btn = document.getElementById("btn-talentmatch");
      topSearch = !topSearch;

      if (topSearch) {
        // ── Activate TalentMatch ────────────────────────────
        btn.textContent = "Matching…";
        btn.disabled    = true;
        showLoading();
        try {
          topMatchedJobs = await loadTopJobs(profile);
          buildFuse(topMatchedJobs); // fuzzy search scoped to matched jobs only
          visibleCount    = PAGE_SIZE;
          btn.textContent = isMember ? "TalentMatch ✓" : "TalentMatch ✓ (Top 10)";
          btn.classList.add("active");
          renderJobs();
        } catch (err) {
          console.error(err);
          topSearch = false;
          btn.textContent = "TalentMatch";
          emptyState("Could not run TalentMatch. Please try again.");
        } finally {
          btn.disabled = false;
        }
      } else {
        // ── Deactivate TalentMatch ──────────────────────────
        topMatchedJobs  = null;
        visibleCount    = PAGE_SIZE;
        btn.textContent = "TalentMatch";
        btn.classList.remove("active");
        buildFuse(allJobs); // restore Fuse index to full job set
        renderJobs();
      }
    });

    init();
  </script>

</body>
</html>
