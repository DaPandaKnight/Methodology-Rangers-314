<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Profile — TalentMatch</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F1EC;
      --bg-card: #FDFCFA;
      --ink: #1A1A18;
      --ink-soft: #5C5C54;
      --green: #1A7F5A;
      --green-bg: #E8F5EF;
      --border: rgba(26,26,24,0.1);
      --border-md: rgba(26,26,24,0.18);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
    }

    nav {
      position: sticky;
      top: 0;
      background: rgba(244,241,236,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      height: 60px;
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      text-decoration: none;
      color: var(--ink);
    }

    .nav-logo span { color: var(--green); }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
    }

    .profile-page {
      max-width: 1100px;
      margin: 70px auto;
      padding: 0 2rem 80px;
    }

    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border-md);
      border-radius: 16px;
      padding: 32px;
    }

    .top-section {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--border-md);
    }

    .logo-box {
      background: var(--green-bg);
      border-radius: 12px;
      padding: 22px;
      text-align: center;
      border: 1px dashed var(--border-md);
    }

    .logo-box img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      border-radius: 12px;
      background: white;
      padding: 12px;
    }

    .placeholder {
      width: 180px;
      height: 180px;
      margin: auto;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 42px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 16px;
    }

    .details {
      color: var(--ink-soft);
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .description {
      background: #F7F5F1;
      border: 1px solid var(--border);
      padding: 18px;
      border-radius: 12px;
      color: var(--ink-soft);
      line-height: 1.6;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 40px;
      margin-top: 32px;
    }

    .entry {
      background: #FFFEFC;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .entry strong {
      display: block;
      margin-bottom: 6px;
    }

    .entry div {
      color: var(--ink-soft);
      margin-top: 4px;
    }

    .website-btn {
      display: inline-block;
      margin-top: 20px;
      background: var(--green);
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      text-decoration: none;
    }

    .side-card {
      background: #FFFEFC;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      height: fit-content;
    }

    .empty {
      color: var(--ink-soft);
      font-size: 14px;
    }

    @media (max-width: 850px) {
      .top-section,
      .content-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html" class="nav-logo">Talent<span>Match</span></a>
 
</nav>

<main class="profile-page">
  <div class="profile-card">

    <section class="top-section">
      <div class="logo-box" id="logoBox">
        <div class="placeholder">🏢</div>
      </div>

      <div>
        <h1 id="companyName">Loading...</h1>

        <div class="details">
          <div id="industry"></div>
          <div id="location"></div>
        </div>

        <div class="description" id="description">
          Loading company profile...
        </div>

        <a id="website" class="website-btn" target="_blank" style="display:none;">
          Visit Website
        </a>
      </div>
    </section>

    <div class="content-grid">
      <div>
        <h2>Employer Contact</h2>
        <div id="contacts"></div>
      </div>

      <div class="side-card">
        <h2>Company Details</h2>
        <div class="details">
          <div id="companyId"></div>
          <div id="createdAt"></div>
        </div>
      </div>
    </div>

    <div>
        <h2>Job Listings</h2>
        <div id="contacts"></div>
      </div>

      <div class="side-card">
        <h2>Jobs, Funcatioanility to be built, need to add in the database links</h2>
      </div>
      <a href="Create A Job Listing.html"  class="website-btn" target="_blank"> Create a Job Listing</a>
        
    </div>

  </div>

  
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "https://bzakjtfktgdlmmevbnfo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6YWtqdGZrdGdkbG1tZXZibmZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDQwMzYsImV4cCI6MjA5MzQyMDAzNn0.z6aTOm35-BLJ43B_rUknD8yilNu-jkOId6RcR68U-B0"
);

function getId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

function formatDate(dateValue) {
  if (!dateValue) return "";

  return new Date(dateValue).toLocaleDateString("en-AU", {
    year: "numeric",
    month: "short",
    day: "numeric"
  });
}

async function loadCompanyProfile() {
  const id = getId();

  if (!id) {
    document.getElementById("companyName").textContent = "No company selected";
    document.getElementById("description").textContent =
      "Open this page using EmployerProfile.html?id=1";
    return;
  }

  const { data: company, error: companyError } = await supabaseClient
    .from("company")
    .select("*")
    .eq("company_id", id)
    .single();

  if (companyError || !company) {
    console.error("Company load error:", companyError);
    document.getElementById("companyName").textContent = "Company not found";
    document.getElementById("description").textContent =
      "Check that the company ID exists in Supabase.";
    return;
  }

  document.getElementById("companyName").textContent = company.name || "Unnamed Company";
  document.getElementById("industry").textContent = company.industry || "";
  document.getElementById("location").textContent = company.location || "";
  document.getElementById("description").textContent =
    company.description || "No company description added.";

  document.getElementById("companyId").textContent = `Company ID: ${company.company_id}`;
  document.getElementById("createdAt").textContent = company.created_at
    ? `Created: ${formatDate(company.created_at)}`
    : "";

  if (company.logo_url) {
    document.getElementById("logoBox").innerHTML =
      `<img src="${company.logo_url}" alt="Company logo">`;
  }

  if (company.website) {
    const website = document.getElementById("website");
    website.href = company.website;
    website.style.display = "inline-block";
  }

  loadContacts(company.company_id);
}

async function loadContacts(companyId) {
  const { data: contacts, error } = await supabaseClient
    .from("contact")
    .select("*")
    .eq("company_id", companyId);

  const contactsBox = document.getElementById("contacts");

  if (error || !contacts || contacts.length === 0) {
    contactsBox.innerHTML = `<p class="empty">No employer contact added.</p>`;
    return;
  }

  contactsBox.innerHTML = contacts.map(contact => `
    <div class="entry">
      <strong>${contact.full_name || "Unnamed Contact"}</strong>
      <div>${contact.position || ""}</div>
      <div>${contact.email || ""}</div>
      <div>${contact.phone_number || ""}</div>
    </div>
  `).join("");
}

loadCompanyProfile();
</script>

</body>
</html>
